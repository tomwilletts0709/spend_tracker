services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_DEBUG: "1"
      SQLITE_PATH: "/app/data/db.sqlite3"
    volumes:
      - sqlite_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    depends_on:
      - backend

volumes:
  sqlite_data:
